name: Build and Release Plugin ZIP

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.1.0)"
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Plugin ZIP and Attach to Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else  
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build plugin ZIP
        run: |
          mkdir -p build/onsend

          # Copy all plugin files EXCEPT repo-only files
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='CHECKSUMS.md' \
            --exclude='build' \
            ./ build/onsend/

          # Create the ZIP with top-level folder named 'onsend'
          cd build
          zip -r ../onsend-${{ steps.version.outputs.VERSION }}.zip onsend/

      - name: Generate SHA256 checksum
        run: |
          sha256sum onsend-${{ steps.version.outputs.VERSION }}.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            onsend-${{ steps.version.outputs.VERSION }}.zip
            SHA256SUMS
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
